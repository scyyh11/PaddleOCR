name: PaddleOCR PR Tests

on:
  push:
    branches: ["main", "release/*", "feat/engine"]
  pull_request:
    branches: ["main", "release/*", "feat/engine"]
    paths-ignore:


permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          predicate-quantifier: every
          filters: |
            docs_only:
              - '**.md'
              - '**.txt'
              - '**.yml'
              - '**.yaml'
              - 'paddleocr-js/**'
              - 'langchain-paddleocr/**'
              - 'skills/**'
              - 'mcp_server/**'
              - 'deploy/**'

  test-pr:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.13"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/pip
          ~/.local/lib/python${{ matrix.python-version }}/site-packages
          ~/.paddleocr/
        key: ${{ runner.os }}-dependencies-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt', 'pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-dependencies-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # On py3.8 only paddleocr[doc2md] is installable: paddlex[ie|trans|ocr]
        # all pull tokenizers, pip resolves to a version that advertises py3.8
        # via requires_python but ships no cp38 wheel, and the source build
        # via maturin fails because PyO3's abi3 minimum is >=3.9.
        #
        # Additional py3.8 pin: modelscope 1.29.x imports `zoneinfo`
        # unconditionally (py3.9 stdlib). paddlex allows modelscope 1.28.x on
        # py3.8 but pip picks the newest compatible (1.29.2). Pre-install a
        # 1.28.x build so pip keeps it during the paddleocr/paddlex resolve.
        if [[ "${{ matrix.python-version }}" == "3.8" ]]; then
          python -m pip install paddlepaddle==3.0.0 -i https://www.paddlepaddle.org.cn/packages/stable/cpu/
          python -m pip install 'modelscope>=1.28.0,<1.29'
          PADDLEOCR_EXTRAS="[doc2md]"
        else
          # Match the paddle version test_gpu.yml uses; paddle 3.3.0 CPU
          # OneDNN can't dispatch pir::ArrayAttribute<pir::DoubleAttribute>
          # attributes in release/3.5 models.
          python -m pip install paddlepaddle==3.1.0 -i https://www.paddlepaddle.org.cn/packages/stable/cpu/
          PADDLEOCR_EXTRAS="[all]"
        fi
        PADDLEX_SERIES=$(grep -oE 'paddlex\[[^]]+\]>=[0-9]+\.[0-9]+' pyproject.toml | head -1 | grep -oE '[0-9]+\.[0-9]+')
        if [ -z "$PADDLEX_SERIES" ]; then
          echo "Failed to determine PaddleX version requirement from pyproject.toml" >&2
          exit 1
        fi
        PADDLEX_BRANCH="release/${PADDLEX_SERIES}"
        echo "Installing PaddleX from branch: ${PADDLEX_BRANCH}"
        python -m pip install -e ".${PADDLEOCR_EXTRAS}" "paddlex@git+https://github.com/PaddlePaddle/PaddleX.git@${PADDLEX_BRANCH}"
        # PaddleX release/3.5 (PR PaddlePaddle/PaddleX#5028) sprinkled PEP
        # 585 annotations (tuple[...], list[...], etc.) across several
        # inference modules without `from __future__ import annotations`.
        # The builtin generics are evaluated at runtime and crash on py3.8.
        # Walk the installed paddlex tree and prepend the future import to
        # every file that uses such syntax and doesn't already have it.
        # pip show is used to avoid triggering the broken `import paddlex`.
        if [[ "${{ matrix.python-version }}" == "3.8" ]]; then
          PADDLEX_LOC=$(python -m pip show paddlex | awk '/^Location: / {print $2}')
          PADDLEX_LOC="${PADDLEX_LOC}" python - <<'PYEOF'
        import os, re, pathlib
        root = pathlib.Path(os.environ["PADDLEX_LOC"]) / "paddlex"
        pep585 = re.compile(r"(?:->|:)\s*(?:tuple|list|dict|set|frozenset|type)\[")
        import_line = re.compile(r"^(?:from\s+\S+\s+import\s|import\s+\S+)")
        for f in root.rglob("*.py"):
            text = f.read_text(encoding="utf-8", errors="ignore")
            if "from __future__ import annotations" in text:
                continue
            if not pep585.search(text):
                continue
            lines = text.splitlines(keepends=True)
            for i, line in enumerate(lines):
                if import_line.match(line):
                    lines.insert(i, "from __future__ import annotations\n\n")
                    break
            else:
                continue
            f.write_text("".join(lines), encoding="utf-8")
            print(f"patched: {f.relative_to(root.parent)}")
        PYEOF
        fi
        python -c "import paddlex; print(f'Installed paddlex version: {paddlex.__version__}')"
    - name: Test with pytest
      run: |
        # On py3.8 only paddleocr[doc2md] is installed (see install step);
        # skip tests for any pipeline or model that needs the ie / trans /
        # doc-parser extras. Also skip test_iaa_augment: its import chain
        # goes through ppocr.data -> lmdb, whose py3.8 wheel references
        # Py_SET_REFCNT (py3.9 symbol) and fails to load.
        if [[ "${{ matrix.python-version }}" == "3.8" ]]; then
          pytest --verbose tests/ \
            --ignore=tests/test_iaa_augment.py \
            --ignore=tests/models/test_doc_vlm.py \
            --ignore=tests/models/test_formula_recognition.py \
            --ignore=tests/models/test_layout_detection.py \
            --ignore=tests/models/test_seal_text_detection.py \
            --ignore=tests/models/test_table_cells_detection.py \
            --ignore=tests/models/test_table_classifcation.py \
            --ignore=tests/models/test_table_structure_recognition.py \
            --ignore=tests/pipelines/test_doc_understanding.py \
            --ignore=tests/pipelines/test_formula_recognition.py \
            --ignore=tests/pipelines/test_patch_layout_parsing.py \
            --ignore=tests/pipelines/test_pp_chatocrv4_doc.py \
            --ignore=tests/pipelines/test_pp_doctranslation.py \
            --ignore=tests/pipelines/test_pp_structurev3.py \
            --ignore=tests/pipelines/test_seal_rec.py \
            --ignore=tests/pipelines/test_table_recognition_v2.py
        else
          pytest --verbose tests/
        fi
